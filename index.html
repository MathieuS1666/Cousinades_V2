<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cousinade Bob 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header-info">
    <div id="countdown">Cousinade 2026 !</div>
    <div class="stats-bar">
        <div class="stat-item">🧍 Convives : <b id="stat-convives">0</b></div>
        <div class="stat-item">👥 Parts : <b id="stat-total">0</b></div>
        <div class="stat-item">🍹 Apéro : <b id="stat-apero">0</b></div>
        <div class="stat-item">🥗 Entrées : <b id="stat-entrees">0</b></div>
        <div class="stat-item">🥘 Plats : <b id="stat-plats">0</b></div>
        <div class="stat-item">🍰 Desserts : <b id="stat-desserts">0</b></div>
        <button onclick="ouvrirAdmin()" style="background:#444; color:white; padding:5px 12px; font-size:0.85em; border-radius:15px; flex:none; width:auto;">⚙️ Admin</button>
    </div>
</div>

<div class="container">
    <div class="formulaire" id="form-scroll">
        <h1 style="text-align:center; color: #660503;">Cousinade 2026</h1>
        <input type="text" id="nomPersonne" placeholder="Votre prénom">

        <div id="boxConvives" class="convives-box">
            <label style="font-size: 0.8em; font-weight: bold; color: #d35400;">Nombre de personnes :</label>
            <input type="number" id="nbConvives" step="0.5" placeholder="Adulte=1, Enfant=0.5">
        </div>
       <p id="msgConvivesOk" style="display:none; color: #27ae60; font-size: 0.85em; text-align: center; font-weight: bold; margin: 10px 0;">
           ✅ Présence enregistrée
       </p>
        <div id="champsPlat">
            <p style="text-align:center; font-size:0.9em;">Dites-nous ce que vous apportez !</p>
            <input type="text" id="nouveauPlat" placeholder="Nom du plat">
            <div class="plat-categories">
                <label><input type="checkbox" id="apero"> Apéro</label>
                <label><input type="checkbox" id="entree"> Entrée</label>
                <label><input type="checkbox" id="platPrincipal"> Plat</label>
                <label><input type="checkbox" id="dessert"> Dessert</label>
                <label><input type="checkbox" id="autre"> Autre</label>
            </div>
            <input type="number" id="nombreParts" placeholder="Nombre de portions">
        </div>

        <div id="champsCom">
            <textarea id="commentaire" placeholder="Un petit mot doux ou une info importante ?"></textarea>
        </div>

        <button onclick="ajouterPlat()" id="btnAjouter">Valider</button>
        <button onclick="annulerEdition()" id="btnAnnuler">Annuler</button>
    </div>

    <div class="reponses">
        <div class="colonnes">
            <div class="colonne" id="apero-col" style="border-top-color:var(--apero)"><h3>🍹 Apéro <span id="total-apero" class="total-badge">0</span></h3><div id="aperoListe"></div></div>
            <div class="colonne" id="entree-col" style="border-top-color:var(--entree)"><h3>🥗 Entrée <span id="total-entree" class="total-badge">0</span></h3><div id="entreeListe"></div></div>
            <div class="colonne" id="plat-col" style="border-top-color:var(--plat)"><h3>🥘 Plat <span id="total-platPrincipal" class="total-badge">0</span></h3><div id="platListe"></div></div>
            <div class="colonne" id="dessert-col" style="border-top-color:var(--dessert)"><h3>🍰 Dessert <span id="total-dessert" class="total-badge">0</span></h3><div id="dessertListe"></div></div>
            <div class="colonne" id="autre-col" style="border-top-color:var(--autre)"><h3>📦 Autre <span id="total-autre" class="total-badge">0</span></h3><div id="autreListe"></div></div>
        </div>
    </div>
</div>

<div class="container liste-presents">
    <h2>👥 Liste des Présents</h2>
    <div id="listePresents"></div>
</div>

<div class="container livre-dor-section">
    <h2>📖 Le Livre d'Or</h2>
    <div id="livreDor" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; text-align: left;"></div>
</div>

<script src="script.js"></script>
</body>
</html>
